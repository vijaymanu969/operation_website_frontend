<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Celume Studios Operations Dashboard">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Celume Ops">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>Celume Ops</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- ── Web Push helpers ─────────────────────────────────────────────── -->
  <script>
    // Converts a URL-safe base64 VAPID public key to a Uint8Array.
    function _urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from(Array.from(rawData).map(c => c.charCodeAt(0)));
    }

    // Register the service worker and subscribe to push.
    // Returns a JSON string of the PushSubscription, or null on failure.
    window.celumeRegisterPush = async function(vapidPublicKey) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
      try {
        const reg = await navigator.serviceWorker.ready;
        // Drop any stale subscription first.
        const existing = await reg.pushManager.getSubscription();
        if (existing) await existing.unsubscribe();

        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: _urlBase64ToUint8Array(vapidPublicKey),
        });
        return JSON.stringify(sub.toJSON());
      } catch (err) {
        console.warn('[Push] subscribe failed:', err);
        return null;
      }
    };

    // Unsubscribe from push. Returns the endpoint string so the backend can
    // clean up, or null if there was no subscription.
    window.celumeUnsubscribePush = async function() {
      if (!('serviceWorker' in navigator)) return null;
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (!sub) return null;
        const endpoint = sub.endpoint;
        await sub.unsubscribe();
        return endpoint;
      } catch (err) {
        console.warn('[Push] unsubscribe failed:', err);
        return null;
      }
    };

    // Register service worker eagerly so it's ready before Flutter calls the
    // helper functions above.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('[Push] SW registration failed:', err);
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
